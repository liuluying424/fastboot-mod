<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fastboot 管理工具</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: radial-gradient(circle at top, #0f1c2e, #050b16);
    color: #fff;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 25px;
    background: linear-gradient(90deg,#4facfe,#00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 0 30px rgba(0,150,255,0.15);
}

.status span {
    color: #00d9ff;
}

button {
    border: none;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.primary-btn {
    width: 100%;
    margin-top: 15px;
    background: linear-gradient(90deg,#0072ff,#00c6ff);
    color: #fff;
    font-weight: bold;
}

.primary-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px #00c6ff;
}

/* 快捷按钮网格 */
.quick-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 15px;
}

@media(min-width: 768px) {
    .quick-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

.quick-btn {
    background: rgba(0,180,255,0.12);
    color: #00d9ff;
    border: 1px solid rgba(0,200,255,0.4);
}

.quick-btn:hover {
    background: rgba(0,200,255,0.25);
    box-shadow: 0 0 15px rgba(0,200,255,0.5);
    transform: translateY(-2px);
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    margin-top: 10px;
    margin-bottom: 10px;
}

.result-field {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 12px;
    font-size: 13px;
    margin-top: 10px;
    min-height: 60px;
    overflow-y: auto;
    border: 1px solid rgba(0,200,255,0.3);
}
</style>
</head>

<body>

<h1>Fastboot Tool</h1>

<div class="card">
    <h3>设备连接</h3>
    <p class="status">当前状态: <span id="status">未连接</span></p>
    <button class="primary-btn" onclick="connectDevice()">连接设备</button>
</div>

<div class="card">
    <h3>Fastboot 指令模式</h3>

    <input type="text" id="commandInput" value="devices">

    <button class="primary-btn" onclick="sendCommand()">发送指令</button>

    <div class="quick-grid">
        <button class="quick-btn" onclick="quickCmd('getvar all')">获取信息</button>
        <button class="quick-btn" onclick="quickCmd('reboot')">重启</button>
        <button class="quick-btn" onclick="quickCmd('reboot bootloader')">重启Bootloader</button>
        <button class="quick-btn" onclick="quickCmd('devices')">检测设备</button>
    </div>

    <h4 style="margin-top:20px;">输出结果:</h4>
    <pre class="result-field"></pre>
</div>

<div style="text-align:center; font-size:12px; opacity:0.6; margin-top:20px;">
    作者: 你的名字<br>
    原作项目地址: https://github.com/kdrag0n/fastboot.js
</div>

<script src="ui.js"></script>
</body>
</html>
