<!DOCTYPE html>
<html>
<head>
    <title>Fastboot 管理工具</title>

    <script src="../dist/fastboot.mjs" type="module"></script>
    <script src="download.js" type="module"></script>
    <script src="ui.js" type="module"></script>

    <style>
        body {
            margin: 0;
            background: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            color: #e6e6e6;
        }

        .container {
            max-width: 880px;
            margin: 50px auto;
            padding: 20px;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 35px;
            text-align: center;
            color: #ffffff;
        }

        .card {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h3 {
            margin-top: 0;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .status-field {
            color: #4da3ff;
            font-weight: 500;
        }

        button, input[type="submit"] {
            background: #1677ff;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        button:hover, input[type="submit"]:hover {
            background: #0f5fd4;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 14px;
            padding: 10px 14px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 14px;
            color: #ffffff;
            font-size: 14px;
        }

        .result-field {
            background: #151515;
            border-radius: 14px;
            padding: 14px;
            max-height: 220px;
            overflow: auto;
            font-size: 13px;
            border: 1px solid #2a2a2a;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 50px;
            color: #888;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="title">Fastboot 管理工具</div>

    <div class="card">
        <h3>设备连接</h3>
        <p>当前状态：<span class="status-field">未连接</span></p>
        <button class="connect-button">连接设备</button>
    </div>

    <div class="card">
        <h3>Fastboot 指令模式</h3>
        <form class="command-form">
            <input type="text" name="command" class="command-input" placeholder="例如：getvar all" />
            <input type="submit" value="发送指令" />
        </form>
        <p>输出结果：</p>
        <pre class="result-field"></pre>
    </div>

    <div class="card">
        <h3>临时启动镜像</h3>
        <form class="boot-form">
            <input type="file" name="boot-file" class="boot-file" />
            <input type="submit" value="启动镜像" />
        </form>
    </div>

    <div class="card">
        <h3>刷写分区</h3>
        <form class="flash-form">
            <input type="file" name="flash-file" class="flash-file" />
            <input type="text" name="flash-partition" class="flash-partition" placeholder="请输入分区名称：boot / recovery / system" />
            <input type="submit" value="开始刷写" />
        </form>
    </div>

    <div class="footer">
        作者 Shiina_Mahiru · 毛毛
    </div>

</div>
</body>
</html>
