<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fastboot 管理工具</title>

<script src="../dist/fastboot.mjs" type="module"></script>
<script src="download.js" type="module"></script>
<script src="ui.js" type="module"></script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
}

body {
    background: #0c0f14;
    color: #e6e6e6;
    padding: 20px;
}

/* 顶部标题 */
.title {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    margin: 30px 0 40px 0;
    letter-spacing: 0.5px;
}

/* 卡片 */
.card {
    background: #11151c;
    border: 1px solid #1d232d;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 22px;
}

/* 卡片标题 */
.card h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    color: #fff;
}

/* 状态文字 */
.status-field {
    color: #4c9aff;
    font-weight: 500;
}

/* 输入框 */
input[type="text"],
input[type="file"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #1f2630;
    background: #0f1319;
    color: #fff;
    font-size: 14px;
    margin-bottom: 12px;
}

input[type="text"]:focus {
    outline: none;
    border-color: #4c9aff;
}

/* 主按钮 */
button,
input[type="submit"] {
    background: #4c9aff;
    color: #fff;
    border: none;
    padding: 11px 16px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.15s ease;
}

button:hover,
input[type="submit"]:hover {
    background: #3a86ff;
}

/* 让主按钮宽度合适 */
.command-form input[type="submit"],
.boot-form input[type="submit"],
.flash-form input[type="submit"],
.connect-button {
    width: 100%;
}

/* 快捷按钮区域 */
.quick-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 14px;
}

/* 桌面三列 */
@media (min-width: 768px) {
    .quick-buttons {
        grid-template-columns: repeat(4, 1fr);
    }
}

.quick-buttons button {
    background: #161b22;
    border: 1px solid #242c38;
    font-size: 13px;
}

.quick-buttons button:hover {
    background: #1c2430;
}

/* 输出框 */
.result-field {
    margin-top: 12px;
    background: #0a0e13;
    border: 1px solid #1d232d;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
}

/* 底部 */
.footer {
    text-align: center;
    margin-top: 50px;
    font-size: 12px;
    color: #777;
    line-height: 1.6;
}

.footer a {
    color: #4c9aff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="title">Fastboot 管理工具</div>

<div class="card">
    <h3>设备连接</h3>
    <p>当前状态：<span class="status-field">未连接</span></p>
    <button class="connect-button">连接设备</button>
</div>

<div class="card">
    <h3>Fastboot 指令模式</h3>

    <form class="command-form">
        <input type="text" name="command" class="command-input" placeholder="例如：getvar all" />
        <input type="submit" value="发送指令" />
    </form>

    <div class="quick-buttons">
        <button type="button" onclick="quickCmd('getvar all')">获取信息</button>
        <button type="button" onclick="quickCmd('reboot')">重启</button>
        <button type="button" onclick="quickCmd('reboot bootloader')">重启Bootloader</button>
        <button type="button" onclick="quickCmd('devices')">检测设备</button>
    </div>

    <p style="margin-top:18px;">输出结果：</p>
    <pre class="result-field"></pre>
</div>

<div class="card">
    <h3>临时启动镜像</h3>
    <form class="boot-form">
        <input type="file" name="boot-file" class="boot-file" />
        <input type="submit" value="启动镜像" />
    </form>
</div>

<div class="card">
    <h3>刷写分区</h3>
    <form class="flash-form">
        <input type="file" name="flash-file" class="flash-file" />
        <input type="text"
               name="flash-partition"
               class="flash-partition"
               list="partition-list"
               placeholder="请输入分区名称：boot / recovery / system" />
        <datalist id="partition-list">
            <option value="boot">
            <option value="recovery">
            <option value="vendor_boot">
            <option value="dtbo">
            <option value="vbmeta">
            <option value="system">
        </datalist>
        <input type="submit" value="开始刷写" />
    </form>
</div>

<div class="footer">
    作者 Shiina_Mahiru · 毛毛<br>
    原项目地址：
    <a href="https://github.com/kdrag0n/fastboot.js" target="_blank">
        https://github.com/kdrag0n/fastboot.js
    </a>
</div>

<script>
function quickCmd(cmd) {
    const input = document.querySelector('.command-input');
    const form = document.querySelector('.command-form');
    input.value = cmd;
    form.dispatchEvent(new Event('submit', { cancelable: true }));
}
</script>

</body>
</html>
